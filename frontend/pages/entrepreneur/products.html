<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BizRise — Mis Productos</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  <link rel="stylesheet" href="../../assets/css/global.css">
  <link rel="stylesheet" href="../../components/entrepreneur-sidebar/sidebar.css">
  <link rel="stylesheet" href="./products.css">
</head>
<body>

  <div class="d-flex">
    <div id="sidebar-container"></div>

    <main class="flex-grow-1 p-4 bg-light min-vh-100">
      <div class="d-flex justify-content-between align-items-center mb-4">
        <h4 class="fw-bold mb-0"><i class="bi bi-box-seam"></i> Gestión de Productos</h4>
        <button class="btn btn-primary btn-sm" data-bs-toggle="modal" data-bs-target="#modal-producto" id="btn-nuevo-producto">
          <i class="bi bi-plus-lg"></i> Añadir Producto
        </button>
      </div>

      <div class="mb-4">
        <div class="input-group search-input">
          <span class="input-group-text bg-white"><i class="bi bi-search"></i></span>
          <input type="text" class="form-control" id="search-productos"
                 placeholder="Buscar en mis productos...">
        </div>
      </div>

      <div class="row g-3" id="products-grid">
      </div>
    </main>
  </div>

  <div class="modal fade" id="modal-producto" tabindex="-1">
    <div class="modal-dialog modal-lg modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title fw-bold" id="modal-producto-title">
            <i class="bi bi-plus-circle"></i> <span id="modal-producto-label">Nuevo Producto</span>
          </h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <form id="producto-form" novalidate>
          <div class="modal-body">
            <input type="hidden" id="producto-id">
            <div class="mb-3">
              <label class="form-label small fw-semibold">Nombre del producto</label>
              <input type="text" class="form-control" id="prod-nombre" required>
            </div>
            <div class="mb-3">
              <label class="form-label small fw-semibold">Descripción</label>
              <textarea class="form-control" id="prod-descripcion" rows="2"></textarea>
            </div>
            <div class="row">
              <div class="col-md-6 mb-3">
                <label class="form-label small fw-semibold">Precio (S/)</label>
                <input type="number" class="form-control" id="prod-precio" step="0.01" min="0">
              </div>
              <div class="col-md-4 mb-3">
                <label class="form-label small fw-semibold">Stock (unidades)</label>
                <input type="number" class="form-control" id="prod-stock" min="0" value="10">
              </div>
              <div class="col-md-2 mb-3 d-flex align-items-end">
                <span class="small text-muted" id="prod-stock-label">Disponible</span>
              </div>
            </div>
            <div class="mb-3">
              <label class="form-label small fw-semibold">Imagen del producto</label>
              <input type="file" class="form-control" id="prod-imagen" accept="image/jpeg,image/png,image/webp">
              <div id="prod-imagen-preview" class="mt-2 d-none">
                <img src="" class="img-fluid rounded preview-prod-img">
              </div>
            </div>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
            <button type="submit" class="btn btn-primary" id="btn-save-producto">
              <i class="bi bi-check-lg"></i> Guardar Producto
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <div class="modal fade" id="modal-eliminar" tabindex="-1">
    <div class="modal-dialog modal-sm modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-body text-center py-4">
          <i class="bi bi-exclamation-triangle text-danger fs-1 mb-3 d-block"></i>
          <h6 class="fw-bold">¿Eliminar este producto?</h6>
          <p class="text-muted small mb-0">Esta acción no se puede deshacer</p>
          <input type="hidden" id="eliminar-producto-id">
        </div>
        <div class="modal-footer justify-content-center border-0 pt-0">
          <button type="button" class="btn btn-secondary btn-sm" data-bs-dismiss="modal">Cancelar</button>
          <button type="button" class="btn btn-danger btn-sm" id="btn-confirmar-eliminar">
            <i class="bi bi-trash"></i> Eliminar
          </button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../../assets/js/api.js"></script>
  <script src="../../assets/js/auth.js"></script>
  <script src="../../components/entrepreneur-sidebar/sidebar.js"></script>
  <script src="./products.js"></script>
</body>
</html>
