<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BizRise — Mis Promociones</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  <link rel="stylesheet" href="../../assets/css/global.css">
  <link rel="stylesheet" href="../../components/entrepreneur-sidebar/sidebar.css">
  <link rel="stylesheet" href="./promotions.css">
</head>
<body>

  <div class="d-flex">
    <div id="sidebar-container"></div>

    <main class="flex-grow-1 p-4 bg-light min-vh-100">
      <div class="d-flex justify-content-between align-items-center mb-4">
        <h4 class="fw-bold mb-0"><i class="bi bi-megaphone"></i> Gestión de Promociones</h4>
        <button class="btn btn-primary btn-sm" data-bs-toggle="modal" data-bs-target="#modal-promocion" id="btn-nueva-promocion">
          <i class="bi bi-plus-lg"></i> Nueva Promoción
        </button>
      </div>

      <div id="promotions-list" class="row g-3">
      </div>
    </main>
  </div>

  <div class="modal fade" id="modal-promocion" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title fw-bold" id="modal-promocion-title">
            <i class="bi bi-megaphone"></i> <span id="modal-promocion-label">Nueva Promoción</span>
          </h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <form id="promocion-form" novalidate>
          <div class="modal-body">
            <input type="hidden" id="promocion-id">
            <div class="mb-3">
              <label class="form-label small fw-semibold">Título de la promoción</label>
              <input type="text" class="form-control" id="promo-titulo" required>
            </div>
            <div class="mb-3">
              <label class="form-label small fw-semibold">Descripción</label>
              <textarea class="form-control" id="promo-descripcion" rows="2"></textarea>
            </div>
            <div class="row">
              <div class="col-md-6 mb-3">
                <label class="form-label small fw-semibold">Fecha de inicio</label>
                <input type="date" class="form-control" id="promo-inicio">
              </div>
              <div class="col-md-6 mb-3">
                <label class="form-label small fw-semibold">Fecha de fin</label>
                <input type="date" class="form-control" id="promo-fin">
              </div>
            </div>
            <div class="mb-3">
              <label class="form-label small fw-semibold">Estado</label>
              <select class="form-select" id="promo-estado">
                <option value="activa">Activa</option>
                <option value="borrador">Borrador</option>
                <option value="vencida">Vencida</option>
              </select>
            </div>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
            <button type="submit" class="btn btn-primary" id="btn-save-promocion">
              <i class="bi bi-check-lg"></i> Guardar Promoción
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <div class="modal fade" id="modal-eliminar-promo" tabindex="-1">
    <div class="modal-dialog modal-sm modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-body text-center py-4">
          <i class="bi bi-exclamation-triangle text-danger fs-1 mb-3 d-block"></i>
          <h6 class="fw-bold">¿Eliminar esta promoción?</h6>
          <p class="text-muted small mb-0">Esta acción no se puede deshacer</p>
          <input type="hidden" id="eliminar-promocion-id">
        </div>
        <div class="modal-footer justify-content-center border-0 pt-0">
          <button type="button" class="btn btn-secondary btn-sm" data-bs-dismiss="modal">Cancelar</button>
          <button type="button" class="btn btn-danger btn-sm" id="btn-confirmar-eliminar-promo">
            <i class="bi bi-trash"></i> Eliminar
          </button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../../assets/js/api.js"></script>
  <script src="../../assets/js/auth.js"></script>
  <script src="../../components/entrepreneur-sidebar/sidebar.js"></script>
  <script src="./promotions.js"></script>
</body>
</html>
