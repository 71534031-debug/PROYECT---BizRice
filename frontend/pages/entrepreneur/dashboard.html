<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BizRise — Panel de Control</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  <link rel="stylesheet" href="../../assets/css/global.css">
  <link rel="stylesheet" href="../../components/entrepreneur-sidebar/sidebar.css">
  <link rel="stylesheet" href="./dashboard.css">
</head>
<body>

  <div class="d-flex">
    <div id="sidebar-container"></div>

    <main class="flex-grow-1 p-4 bg-light min-vh-100">
      <div class="d-flex justify-content-between align-items-center mb-4">
        <h4 class="fw-bold mb-0"><i class="bi bi-grid"></i> Panel de Control</h4>
        <small class="text-muted" id="bienvenida"></small>
      </div>

      <div class="row g-3 mb-4" id="metricas-cards">
      </div>

      <div class="row g-4">
        <div class="col-lg-8">
          <div class="card border-0 shadow-sm">
            <div class="card-body">
              <h6 class="fw-bold mb-3"><i class="bi bi-activity"></i> Actividad Reciente</h6>
              <div id="actividad-lista">
                <p class="text-muted small mb-0">Cargando...</p>
              </div>
              <div class="text-center mt-2 d-none" id="actividad-footer">
                <a class="btn btn-link btn-sm text-decoration-none" href="/pages/entrepreneur/my-business.html">
                  Ver todo el historial <i class="bi bi-arrow-right"></i>
                </a>
              </div>
            </div>
          </div>
        </div>

        <div class="col-lg-4">
          <div class="card border-0 shadow-sm cta-gradient">
            <div class="card-body text-white text-center">
              <h6 class="fw-bold mb-2"><i class="bi bi-rocket-takeoff"></i> ¿Listo para expandir tu alcance?</h6>
              <p class="small opacity-75 mb-3">Llega a más clientes en Huancayo</p>
              <button class="btn btn-light btn-sm w-100 mb-2" onclick="irAPromociones()">
                <i class="bi bi-megaphone"></i> Crear Campaña
              </button>
              <button class="btn btn-outline-light btn-sm w-100" onclick="irAMiNegocio()">
                <i class="bi bi-building"></i> Mi Negocio
              </button>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <!-- Premium Modal -->
  <div class="modal fade" id="modal-premium" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-body text-center py-5">
          <i class="bi bi-stars" style="font-size:3rem;color:var(--bizrise-primary)"></i>
          <h5 class="fw-bold mt-3">Función premium</h5>
          <p class="text-muted small mb-0">Disponible próximamente</p>
        </div>
        <div class="modal-footer border-0 justify-content-center pt-0">
          <button class="btn btn-secondary btn-sm" data-bs-dismiss="modal">Cerrar</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../../assets/js/api.js"></script>
  <script src="../../assets/js/auth.js"></script>
  <script src="../../components/entrepreneur-sidebar/sidebar.js"></script>
  <script src="./dashboard.js"></script>
</body>
</html>
