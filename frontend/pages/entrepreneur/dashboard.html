<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BizRise — Panel de Control</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  <link rel="stylesheet" href="../../assets/css/global.css">
  <link rel="stylesheet" href="../../components/entrepreneur-sidebar/sidebar.css">
  <link rel="stylesheet" href="./dashboard.css">
</head>
<body>

  <div class="d-flex">
    <div id="sidebar-container"></div>

    <main class="flex-grow-1 p-4 bg-light min-vh-100">
      <div class="d-flex justify-content-between align-items-center mb-4">
        <h4 class="fw-bold mb-0"><i class="bi bi-grid"></i> Panel de Control</h4>
        <small class="text-muted" id="bienvenida"></small>
      </div>

      <div class="row g-3 mb-4" id="metricas-cards">
      </div>

      <div class="row g-4">
        <div class="col-lg-8">
          <div class="card border-0 shadow-sm">
            <div class="card-body">
              <h6 class="fw-bold mb-3"><i class="bi bi-activity"></i> Actividad Reciente</h6>
              <div id="actividad-lista">
                <p class="text-muted small mb-0">Cargando...</p>
              </div>
            </div>
          </div>
        </div>

        <div class="col-lg-4">
          <div class="card border-0 shadow-sm cta-gradient">
            <div class="card-body text-white text-center">
              <h6 class="fw-bold mb-2"><i class="bi bi-rocket-takeoff"></i> ¿Listo para expandir tu alcance?</h6>
              <p class="small opacity-75 mb-3">Llega a más clientes en Huancayo</p>
              <button class="btn btn-light btn-sm w-100 mb-2" disabled>
                <i class="bi bi-megaphone"></i> Crear Campaña
              </button>
              <a href="/pages/directory/directory.html" class="btn btn-outline-light btn-sm w-100">
                <i class="bi bi-search"></i> Explorar Directorio
              </a>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../../assets/js/api.js"></script>
  <script src="../../assets/js/auth.js"></script>
  <script src="../../components/entrepreneur-sidebar/sidebar.js"></script>
  <script src="./dashboard.js"></script>
</body>
</html>
