<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BizRise — Iniciar Sesión</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  <link rel="stylesheet" href="../../assets/css/global.css">
  <link rel="stylesheet" href="./login.css">
</head>
<body class="bg-light">

  <div class="vh-100 d-flex align-items-center justify-content-center">
    <div class="col-11 col-sm-8 col-md-5 col-lg-4">

      <div class="text-center mb-4">
        <a href="/pages/home/home.html" class="text-decoration-none">
          <h1 class="display-6 fw-bold text-primary">
            <i class="bi bi-buildings"></i> BizRise
          </h1>
        </a>
        <p class="text-muted">Directorio de emprendedores locales en Huancayo</p>
      </div>

      <div class="card shadow-sm border-0">
        <div class="card-body p-4">

          <ul class="nav nav-tabs nav-fill mb-4">
            <li class="nav-item">
              <a class="nav-link active fw-semibold" href="/pages/auth/login.html">
                <i class="bi bi-box-arrow-in-right"></i> Iniciar Sesión
              </a>
            </li>
            <li class="nav-item">
              <a class="nav-link text-muted" href="/pages/auth/register.html">
                <i class="bi bi-person-plus"></i> Registrarse
              </a>
            </li>
          </ul>

          <div id="login-error" class="alert alert-danger d-none" role="alert"></div>

          <form id="login-form" novalidate>
            <div class="mb-3">
              <label for="login-correo" class="form-label small fw-semibold">Correo electrónico</label>
              <input type="email" class="form-control" id="login-correo"
                     placeholder="tu@correo.com" required>
              <div class="invalid-feedback">Ingresa un correo válido</div>
            </div>

            <div class="mb-3">
              <label for="login-contrasena" class="form-label small fw-semibold">Contraseña</label>
              <input type="password" class="form-control" id="login-contrasena"
                     placeholder="Tu contraseña" required>
              <div class="invalid-feedback">Ingresa tu contraseña</div>
            </div>

            <div class="d-flex justify-content-between align-items-center mb-4">
              <div class="form-check">
                <input type="checkbox" class="form-check-input" id="recordar">
                <label class="form-check-label small" for="recordar">Mantener sesión iniciada</label>
              </div>
              <a href="#" class="small text-decoration-none text-muted disabled-link disabled-link-style" id="forgot-link">
                ¿Olvidaste tu contraseña?
              </a>
            </div>

            <button type="submit" class="btn btn-primary w-100 mb-3" id="btn-login">
              <i class="bi bi-box-arrow-in-right"></i> Ingresar
            </button>
          </form>

          <div class="text-center mb-3">
            <small class="text-muted">o continúa con</small>
          </div>

          <div class="d-flex gap-2">
            <button class="btn btn-outline-secondary w-100 btn-sm" disabled>
              <i class="bi bi-google"></i> Google
            </button>
            <button class="btn btn-outline-secondary w-100 btn-sm" disabled>
              <i class="bi bi-facebook"></i> Facebook
            </button>
          </div>

        </div>
      </div>

      <p class="text-center mt-3 small text-muted">
        ¿No tienes cuenta?
        <a href="/pages/auth/register.html" class="text-decoration-none fw-semibold">
          Regístrate aquí
        </a>
      </p>

    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../../assets/js/api.js"></script>
  <script src="../../assets/js/auth.js"></script>
  <script src="./login.js"></script>
</body>
</html>
