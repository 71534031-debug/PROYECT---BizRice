<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BizRise — Registrarse</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  <link rel="stylesheet" href="../../assets/css/global.css">
  <link rel="stylesheet" href="./register.css">
</head>
<body class="bg-light">

  <div class="min-vh-100 d-flex align-items-center justify-content-center py-4">
    <div class="col-11 col-sm-8 col-md-6 col-lg-4">

      <div class="text-center mb-4">
        <a href="/pages/home/home.html" class="text-decoration-none">
          <h1 class="display-6 fw-bold text-primary">
            <i class="bi bi-buildings"></i> BizRise
          </h1>
        </a>
        <p class="text-muted">Crea tu cuenta y registra tu emprendimiento</p>
      </div>

      <div class="card shadow-sm border-0">
        <div class="card-body p-4">

          <ul class="nav nav-tabs nav-fill mb-4">
            <li class="nav-item">
              <a class="nav-link text-muted" href="/pages/auth/login.html">
                <i class="bi bi-box-arrow-in-right"></i> Iniciar Sesión
              </a>
            </li>
            <li class="nav-item">
              <a class="nav-link active fw-semibold" href="/pages/auth/register.html">
                <i class="bi bi-person-plus"></i> Registrarse
              </a>
            </li>
          </ul>

          <div id="register-error" class="alert alert-danger d-none" role="alert"></div>

          <form id="register-form" novalidate>
            <div class="row">
              <div class="col-md-6 mb-3">
                <label for="reg-nombre" class="form-label small fw-semibold">Nombre</label>
                <input type="text" class="form-control" id="reg-nombre"
                       placeholder="Tu nombre" required>
                <div class="invalid-feedback">Ingresa tu nombre</div>
              </div>
              <div class="col-md-6 mb-3">
                <label for="reg-apellido" class="form-label small fw-semibold">Apellido</label>
                <input type="text" class="form-control" id="reg-apellido"
                       placeholder="Tu apellido" required>
                <div class="invalid-feedback">Ingresa tu apellido</div>
              </div>
            </div>

            <div class="mb-3">
              <label for="reg-correo" class="form-label small fw-semibold">Correo electrónico</label>
              <input type="email" class="form-control" id="reg-correo"
                     placeholder="tu@correo.com" required>
              <div class="invalid-feedback">Ingresa un correo válido</div>
            </div>

            <div class="mb-3">
              <label for="reg-contrasena" class="form-label small fw-semibold">Contraseña</label>
              <input type="password" class="form-control" id="reg-contrasena"
                     placeholder="Mínimo 8 caracteres, al menos 1 número" required>
              <div class="invalid-feedback">Debe tener mínimo 8 caracteres y al menos 1 número</div>
            </div>

            <div class="mb-4">
              <label for="reg-confirmar" class="form-label small fw-semibold">Confirmar contraseña</label>
              <input type="password" class="form-control" id="reg-confirmar"
                     placeholder="Repite la contraseña" required>
              <div class="invalid-feedback">Las contraseñas no coinciden</div>
            </div>

            <button type="submit" class="btn btn-primary w-100 mb-3" id="btn-register">
              <i class="bi bi-person-plus"></i> Crear cuenta
            </button>
          </form>

          <div class="text-center mb-3">
            <small class="text-muted">o continúa con</small>
          </div>

          <div class="d-flex gap-2">
            <button class="btn btn-outline-secondary w-100 btn-sm" disabled>
              <i class="bi bi-google"></i> Google
            </button>
            <button class="btn btn-outline-secondary w-100 btn-sm" disabled>
              <i class="bi bi-facebook"></i> Facebook
            </button>
          </div>

        </div>
      </div>

      <p class="text-center mt-3 small text-muted">
        ¿Ya tienes cuenta?
        <a href="/pages/auth/login.html" class="text-decoration-none fw-semibold">
          Inicia sesión aquí
        </a>
      </p>

    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../../assets/js/api.js"></script>
  <script src="../../assets/js/auth.js"></script>
  <script src="./register.js"></script>
</body>
</html>
