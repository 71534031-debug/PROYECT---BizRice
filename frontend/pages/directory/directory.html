<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BizRise — Directorio</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  <link rel="stylesheet" href="../../assets/css/global.css">
  <link rel="stylesheet" href="./directory.css">
</head>
<body>

  <div id="navbar-container"></div>

  <div class="container py-4">
    <div class="row">

      <aside class="col-lg-3 mb-4">
        <div class="card shadow-sm border-0 sticky-top sticky-sidebar">
          <div class="card-body">
            <h6 class="fw-bold mb-3"><i class="bi bi-funnel"></i> Filtros</h6>

            <div class="mb-3">
              <label class="form-label small fw-semibold">Buscar</label>
              <div class="input-group input-group-sm">
                <span class="input-group-text bg-white"><i class="bi bi-search"></i></span>
                <input type="text" id="filter-busqueda" class="form-control"
                       placeholder="Nombre o descripción...">
              </div>
            </div>

            <div class="mb-3">
              <label class="form-label small fw-semibold">Categorías</label>
              <div class="list-group list-group-flush" id="filter-categorias">
              </div>
            </div>

            <div class="mb-3">
              <label class="form-label small fw-semibold">Distrito</label>
              <select id="filter-distrito" class="form-select form-select-sm">
                <option value="">Todos los distritos</option>
                <option value="Huancayo">Huancayo</option>
                <option value="El Tambo">El Tambo</option>
                <option value="Chilca">Chilca</option>
                <option value="San Agustín">San Agustín</option>
                <option value="Pilcomayo">Pilcomayo</option>
              </select>
            </div>

            <div class="mb-3">
              <label class="form-label small fw-semibold">Ordenar por</label>
              <select id="filter-orden" class="form-select form-select-sm">
                <option value="reciente">Más recientes</option>
                <option value="valoracion">Mejor valorados</option>
                <option value="nombre">Nombre A-Z</option>
              </select>
            </div>

            <button id="btn-limpiar" class="btn btn-outline-secondary btn-sm w-100">
              <i class="bi bi-x-circle"></i> Limpiar filtros
            </button>
          </div>
        </div>
      </aside>

      <div class="col-lg-9">
        <div class="d-flex justify-content-between align-items-center mb-3">
          <h5 class="fw-bold mb-0"><span id="result-count">0</span> negocios encontrados</h5>
          <div id="loading-spinner" class="spinner-border spinner-border-sm text-primary d-none" role="status">
            <span class="visually-hidden">Cargando...</span>
          </div>
        </div>

        <div class="row g-4" id="directorio-grid">
        </div>

        <nav class="mt-4" aria-label="Paginación">
          <ul class="pagination justify-content-center" id="pagination">
          </ul>
        </nav>
      </div>

    </div>
  </div>

  <div id="footer-container"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../../assets/js/api.js"></script>
  <script src="../../assets/js/auth.js"></script>
  <script src="../../components/navbar/navbar.js"></script>
  <script src="../../components/footer/footer.js"></script>
  <script src="./directory.js"></script>
</body>
</html>
