version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: bizrise-postgres
    environment:
      POSTGRES_DB: BizRiseDB
      POSTGRES_USER: bizrise
      POSTGRES_PASSWORD: BizRise_Admin2026!
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
